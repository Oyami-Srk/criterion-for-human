name: Benchmark

on:
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

permissions:
  pull-requests: write
  contents: read

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build criterion-for-human
        run: cargo build --release

      - name: Run example benchmark (for demonstration)
        run: |
          # Note: This runs the actual benchmarks for verification
          # In a real project, you would configure criterion to output JSON
          cargo bench --bench example_benchmark
        continue-on-error: true

      - name: Generate benchmark report
        run: |
          # Using sample output for demonstration purposes
          # In a real setup, configure criterion to output JSON and use that instead
          cat examples/sample_output.json | ./target/release/criterion-for-human > benchmark_report.md
          echo "Report generated"

      - name: Display report (for debugging)
        run: cat benchmark_report.md

      - name: Post benchmark comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const benchmarkReport = fs.readFileSync('benchmark_report.md', 'utf8');

            const body = `## 📊 Benchmark Results (Demo)

            This demonstrates the benchmark report format using sample data.

            > **Note**: This is a demonstration using sample benchmark data. In a production setup, configure your criterion benchmarks to output JSON format and use that output instead.

            <details open>
            <summary>📈 Benchmark Report</summary>

            ${benchmarkReport}

            </details>

            ---
            *Report generated by [criterion-for-human](https://github.com/Oyami-Srk/criterion-for-human)*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Report generated by criterion-for-human')
            );

            // Create or update comment
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
